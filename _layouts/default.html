<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

      <a class="navbar-brand" href="{{ '/' | relative_url }}">
        Test1
      </a>

      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="{{ '/' | relative_url }}">Home</a>
        <a class="nav-link" href="{{ '/portfolio/' | relative_url }}">Portfolio</a>
        <a class="nav-link" href="{{ '/map/' | relative_url }}">Map</a>
        <a class="nav-link" href="{{ '/about/' | relative_url }}">About</a>
      </div>

    </div>
  </nav>

  <main class="container py-4">
    {{ content }}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  {% if page.load_map_js %}
  <script src="{{ '/assets/js/map.js' | relative_url }}"></script>
  {% endif %}

  <div id="lightbox" class="lightbox hidden panel-open">
    <div class="lightbox-main">
      <button id="lightbox-prev" class="lightbox-arrow lightbox-ui" type="button"
        aria-label="Previous image">&#10094;</button>

      <button id="lightbox-left-zone" class="lightbox-zone" type="button" aria-label="Previous image"></button>

      <div id="lightbox-stage" class="lightbox-stage">
        <img id="lightbox-image-a" class="lightbox-image active" src="" alt="">
        <img id="lightbox-image-b" class="lightbox-image" src="" alt="">
      </div>

      <button id="lightbox-right-zone" class="lightbox-zone" type="button" aria-label="Next image"></button>

      <button id="lightbox-next" class="lightbox-arrow lightbox-ui" type="button"
        aria-label="Next image">&#10095;</button>
    </div>

    <aside class="lightbox-panel">
      <div class="lightbox-panel-content">
        <p id="lightbox-caption"></p>
        <div class="lightbox-details">More details will go here.</div>
      </div>
    </aside>

    <div class="lightbox-controls lightbox-ui">
      <button id="lightbox-close" class="lightbox-control" type="button" aria-label="Close">×</button>
      <button id="lightbox-panel-toggle" class="lightbox-control" type="button" aria-label="Toggle panel">i</button>
    </div>
  </div>
  <script src="{{ '/assets/js/lightbox.js' | relative_url }}"></script>

</body>

</html>
